<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>御風堂國際室內設計｜工程報價單</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #7A6030;
    --dark: #0D0D0D;
    --surface: #151515;
    --surface2: #1C1C1C;
    --surface3: #222222;
    --border: #2A2A2A;
    --border-gold: rgba(201,168,76,0.3);
    --text: #E8E4DC;
    --text-dim: #888;
    --text-muted: #555;
    --red: #C0392B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,13,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border-gold);
    padding: 13px 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .toolbar-brand {
    font-family: 'Playfair Display', serif;
    font-size: 15px; letter-spacing: 0.14em; color: var(--gold);
  }
  .toolbar-actions { display: flex; gap: 12px; }
  .btn {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px; letter-spacing: 0.1em;
    padding: 8px 20px; border-radius: 2px; cursor: pointer;
    border: 1px solid var(--border-gold);
    background: transparent; color: var(--gold-light);
    transition: all 0.2s;
  }
  .btn:hover { background: var(--gold); color: var(--dark); border-color: var(--gold); }
  .btn-primary { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 600; }
  .btn-primary:hover { background: var(--gold-light); }

  /* ── HERO BANNER ── */
  .hero-banner {
    position: relative; width: 100%; height: 320px;
    overflow: hidden; background: #080808;
  }
  .hero-slide {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0; transition: opacity 1.8s ease;
    animation: kenburns 14s ease-in-out infinite;
  }
  .hero-slide.active { opacity: 1; }
  @keyframes kenburns {
    0%   { transform: scale(1.07) translate(0,0); }
    50%  { transform: scale(1.13) translate(-1.2%,-0.8%); }
    100% { transform: scale(1.07) translate(0,0); }
  }
  .hero-overlay {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(to bottom,
      rgba(13,13,13,0.30) 0%,
      rgba(13,13,13,0.52) 55%,
      rgba(13,13,13,0.93) 100%);
  }
  .hero-side-overlay {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(to right, rgba(13,13,13,0.7) 0%, transparent 40%, transparent 60%, rgba(13,13,13,0.7) 100%);
  }
  .hero-content {
    position: absolute; inset: 0; z-index: 3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 32px;
  }
  .hero-eyebrow {
    font-size: 10px; letter-spacing: 0.42em;
    color: var(--gold-dim); text-transform: uppercase;
    margin-bottom: 16px;
    animation: fadeUp 1s ease 0.3s both;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 4.5vw, 44px);
    color: var(--gold); letter-spacing: 0.1em; line-height: 1.2;
    animation: fadeUp 1s ease 0.5s both;
  }
  .hero-title em { font-style: italic; color: var(--gold-light); }
  .hero-sub {
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(232,228,220,0.45); text-transform: uppercase;
    margin-top: 16px;
    animation: fadeUp 1s ease 0.7s both;
  }
  .hero-line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 14px auto 0;
    animation: fadeUp 1s ease 0.9s both;
  }
  .hero-dots {
    position: absolute; bottom: 22px; left: 50%;
    transform: translateX(-50%); z-index: 4;
    display: flex; gap: 8px;
  }
  .hero-dot {
    height: 2px; width: 20px;
    background: rgba(201,168,76,0.3);
    cursor: pointer; transition: all 0.35s;
    border: none; padding: 0;
  }
  .hero-dot.active { background: var(--gold); width: 34px; }

  /* ── PAGE WRAPPER ── */
  .page-wrap {
    max-width: 920px; margin: 36px auto;
    padding: 0 20px 80px;
  }

  /* ── HEADER CARD ── */
  .header-card {
    background: var(--surface);
    border: 1px solid var(--border-gold);
    padding: 46px 52px 40px;
    position: relative; overflow: hidden;
  }
  .header-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  /* 右側裝飾圖 */
  .header-img-panel {
    position: absolute; right: 0; top: 0; bottom: 0; width: 200px;
    overflow: hidden; z-index: 0; pointer-events: none;
  }
  .header-img-panel::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to right, var(--surface) 0%, rgba(21,21,21,0.6) 50%, transparent 100%);
  }
  .header-img-panel img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.28; filter: sepia(25%) contrast(1.05) brightness(0.8);
    animation: imgDrift 20s ease-in-out infinite alternate;
  }
  /* 大字水印 */
  .header-watermark {
    position: absolute; right: 48px; top: 22px;
    font-size: 110px; line-height: 1;
    color: rgba(201,168,76,0.035);
    font-family: 'Playfair Display', serif;
    pointer-events: none; z-index: 0; user-select: none;
  }
  .header-body { position: relative; z-index: 1; }
  .header-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 34px;
  }
  .company-block .company-name {
    font-family: 'Playfair Display', serif;
    font-size: 27px; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .company-block .company-sub {
    font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase;
  }
  .doc-badge { text-align: right; }
  .doc-badge .doc-title {
    font-family: 'Playfair Display', serif;
    font-size: 21px; color: var(--text); letter-spacing: 0.06em; margin-bottom: 8px;
  }
  .doc-badge .doc-no {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--gold-dim); letter-spacing: 0.1em;
  }

  /* ── META GRID ── */
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .meta-group label {
    display: block; font-size: 10px; letter-spacing: 0.2em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px;
  }
  .meta-group input, .meta-group textarea {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid var(--border); color: var(--text);
    font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 300;
    padding: 6px 2px; outline: none; transition: border-color 0.2s; resize: none;
  }
  .meta-group input:focus, .meta-group textarea:focus { border-bottom-color: var(--gold); }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    margin-top: 2px; position: relative; overflow: hidden;
  }
  /* 每個 section 右側微透圖 */
  .section-deco {
    position: absolute; right: 0; top: 0; bottom: 0; width: 130px;
    overflow: hidden; pointer-events: none; z-index: 0;
  }
  .section-deco::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to right, var(--surface) 0%, rgba(21,21,21,0.3) 60%, transparent 100%);
  }
  .section-deco img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.08; filter: sepia(40%) brightness(0.85);
  }
  .section-inner { position: relative; z-index: 1; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .section-title {
    display: flex; align-items: center; gap: 12px;
    font-size: 12px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase;
  }
  .section-title .s-icon {
    width: 20px; height: 20px; border: 1px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center; font-size: 10px;
  }

  /* ── TABLE ── */
  .quote-table { width: 100%; border-collapse: collapse; }
  .quote-table thead tr { border-bottom: 1px solid var(--border-gold); }
  .quote-table th {
    font-size: 10px; letter-spacing: 0.18em; color: var(--text-muted);
    text-transform: uppercase; padding: 13px 16px; text-align: left; font-weight: 400;
  }
  .quote-table th.right { text-align: right; }
  .quote-table td {
    padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  .quote-table tbody tr:last-child td { border-bottom: none; }
  .quote-table tbody tr:hover { background: rgba(201,168,76,0.025); }
  .td-total {
    font-family: 'DM Mono', monospace; text-align: right;
    font-size: 13px; color: var(--gold-light);
  }
  .cell-input {
    width: 100%; background: transparent; border: none; color: var(--text);
    font-family: 'Noto Serif TC', serif; font-size: 13px; font-weight: 300;
    padding: 6px 8px; outline: none; border-radius: 2px; transition: background 0.15s;
  }
  .cell-input:focus { background: rgba(201,168,76,0.06); }
  .cell-input.mono {
    font-family: 'DM Mono', monospace; text-align: right; font-size: 13px;
  }
  .del-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 16px; line-height: 1;
    padding: 4px 8px; border-radius: 2px; transition: color 0.15s, background 0.15s;
  }
  .del-btn:hover { color: var(--red); background: rgba(192,57,43,0.1); }
  .add-row {
    padding: 13px 24px; border-top: 1px dashed var(--border);
    background: var(--surface2);
  }
  .add-row-btn {
    background: transparent; border: 1px dashed var(--border);
    color: var(--text-muted); font-family: 'Noto Serif TC', serif;
    font-size: 12px; letter-spacing: 0.1em;
    padding: 7px 20px; cursor: pointer; border-radius: 2px; transition: all 0.2s;
  }
  .add-row-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── TOTALS ── */
  .totals-card {
    background: var(--surface); border: 1px solid var(--border-gold);
    margin-top: 16px; position: relative; overflow: hidden;
  }
  .totals-bg {
    position: absolute; inset: 0; z-index: 0;
  }
  .totals-bg img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.09; filter: sepia(45%) brightness(0.7);
    animation: imgDrift 24s ease-in-out infinite alternate-reverse;
  }
  .totals-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(13,13,13,0.65) 0%, transparent 100%);
  }
  .totals-inner {
    position: relative; z-index: 1;
    padding: 32px 40px;
    display: flex; justify-content: flex-end;
  }
  .totals-table { min-width: 340px; }
  .totals-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .totals-row:last-child { border-bottom: none; }
  .totals-label { color: var(--text-dim); letter-spacing: 0.1em; }
  .totals-value { font-family: 'DM Mono', monospace; color: var(--text); }
  .totals-row.grand {
    margin-top: 8px; padding-top: 16px;
    border-top: 1px solid var(--gold-dim); border-bottom: none;
  }
  .totals-row.grand .totals-label {
    font-size: 14px; color: var(--gold);
    letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;
  }
  .totals-row.grand .totals-value {
    font-size: 24px; color: var(--gold-light); letter-spacing: 0.04em;
  }
  .tax-input-wrap { display: flex; align-items: center; gap: 6px; }
  .tax-input {
    background: transparent; border: none;
    border-bottom: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px;
    width: 40px; text-align: right; padding: 2px 4px; outline: none;
  }
  .tax-input:focus { border-bottom-color: var(--gold); }

  /* ── REMARKS ── */
  .remarks-card {
    background: var(--surface); border: 1px solid var(--border);
    margin-top: 2px; padding: 28px 32px;
    position: relative; overflow: hidden;
  }
  .remarks-deco {
    position: absolute; right: 0; top: 0; bottom: 0; width: 180px;
    pointer-events: none; z-index: 0;
  }
  .remarks-deco::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to right, var(--surface) 0%, rgba(21,21,21,0.4) 55%, transparent 100%);
  }
  .remarks-deco img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.1; filter: sepia(30%) brightness(0.75);
    animation: imgDrift 26s ease-in-out infinite alternate;
  }
  .remarks-body { position: relative; z-index: 1; }
  .remarks-label {
    font-size: 10px; letter-spacing: 0.2em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px;
  }
  .remarks-ta {
    width: 100%; background: transparent; border: none;
    border-left: 2px solid var(--gold-dim); padding-left: 16px;
    color: var(--text); font-family: 'Noto Serif TC', serif;
    font-size: 13px; font-weight: 300; line-height: 1.9;
    outline: none; resize: none; min-height: 80px;
  }

  /* ── SIG ── */
  .sig-row { display: flex; gap: 32px; margin-top: 48px; }
  .sig-block { flex: 1; border-top: 1px solid var(--border); padding-top: 12px; }
  .sig-block-label { font-size: 10px; letter-spacing: 0.18em; color: var(--text-muted); text-transform: uppercase; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--gold-dim);
    color: var(--gold-light); font-size: 13px; letter-spacing: 0.08em;
    padding: 12px 28px; border-radius: 2px;
    opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes imgDrift {
    from { transform: scale(1.05) translateY(0); }
    to   { transform: scale(1.11) translateY(-4%); }
  }
  .page-wrap > * { animation: fadeUp 0.48s ease both; }
  .page-wrap > *:nth-child(1) { animation-delay: 0.05s; }
  .page-wrap > *:nth-child(2) { animation-delay: 0.12s; }
  .page-wrap > *:nth-child(3) { animation-delay: 0.18s; }
  .page-wrap > *:nth-child(4) { animation-delay: 0.24s; }
  .page-wrap > *:nth-child(5) { animation-delay: 0.3s; }

  /* ── PRINT ── */
  @media print {
    .toolbar, .btn, .add-row, .del-btn,
    .hero-banner, .header-img-panel, .section-deco,
    .totals-bg, .remarks-deco { display: none !important; }
    body { background: #fff; color: #111; }
    .header-card, .section-card, .totals-card, .remarks-card {
      background: #fff !important; border-color: #ccc !important;
    }
    .company-block .company-name { color: #8B6914 !important; }
    .quote-table th { color: #777 !important; }
    .td-total { color: #8B6914 !important; }
    .totals-row.grand .totals-value { color: #8B6914 !important; }
    .totals-inner { padding: 24px 32px !important; }
  }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-brand">御風堂 · 報價管理系統</span>
  <div class="toolbar-actions">
    <button class="btn" onclick="addSection()">＋ 新增工程類別</button>
    <button class="btn btn-primary" onclick="window.print()">列印 / 匯出</button>
  </div>
</div>

<!-- HERO BANNER -->
<div class="hero-banner" id="heroBanner">
  <!-- slides injected by JS -->
  <div class="hero-overlay"></div>
  <div class="hero-side-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Interior Design · Renovation Quotation</div>
    <div class="hero-title">御風堂國際室內設計<br><em>工程報價單</em></div>
    <div class="hero-sub">Yuphonetone International Interior Design</div>
    <div class="hero-line"></div>
  </div>
  <div class="hero-dots" id="heroDots"></div>
</div>

<!-- MAIN -->
<div class="page-wrap" id="quoteDoc">

  <!-- HEADER -->
  <div class="header-card">
    <div class="header-watermark">御</div>
    <div class="header-img-panel">
      <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=500&auto=format&fit=crop&q=70" alt="" loading="lazy" />
    </div>
    <div class="header-body">
      <div class="header-top">
        <div class="company-block">
          <div class="company-name">御風堂國際室內設計</div>
          <div class="company-sub">Yuphonetone International Interior Design</div>
        </div>
        <div class="doc-badge">
          <div class="doc-title">工程報價單</div>
          <div class="doc-no" id="docNo">QT-2026-001</div>
        </div>
      </div>
      <div class="meta-grid">
        <div class="meta-group">
          <label>委託客戶</label>
          <input type="text" id="clientName" placeholder="請輸入客戶姓名" />
        </div>
        <div class="meta-group">
          <label>聯絡電話</label>
          <input type="text" id="clientPhone" placeholder="0912-345-678" />
        </div>
        <div class="meta-group">
          <label>設計師</label>
          <input type="text" id="designerName" value="簡國輝 Johnson Chien" />
        </div>
        <div class="meta-group">
          <label>報價日期</label>
          <input type="text" id="quoteDate" />
        </div>
        <div class="meta-group" style="grid-column: 1 / -1;">
          <label>施工地址</label>
          <input type="text" id="siteAddr" placeholder="請輸入施工地點地址" />
        </div>
        <div class="meta-group">
          <label>工程坪數</label>
          <input type="text" id="siteArea" placeholder="例：35 坪" />
        </div>
        <div class="meta-group">
          <label>有效期限</label>
          <input type="text" id="validDate" placeholder="例：2026/06/21" />
        </div>
      </div>
    </div>
  </div>

  <!-- SECTIONS -->
  <div id="sectionsContainer"></div>

  <!-- TOTALS -->
  <div class="totals-card">
    <div class="totals-bg">
      <img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=900&auto=format&fit=crop&q=60" alt="" loading="lazy" />
    </div>
    <div class="totals-inner">
      <div class="totals-table">
        <div class="totals-row">
          <span class="totals-label">工程小計</span>
          <span class="totals-value" id="subtotalDisplay">NT$ 0</span>
        </div>
        <div class="totals-row">
          <span class="totals-label">
            <div class="tax-input-wrap">
              營業稅
              <input class="tax-input" id="taxRate" type="number" value="5" min="0" max="100" oninput="recalc()" />%
            </div>
          </span>
          <span class="totals-value" id="taxDisplay">NT$ 0</span>
        </div>
        <div class="totals-row">
          <span class="totals-label">設計費</span>
          <span class="totals-value">
            <input class="tax-input" id="designFee" type="number" value="0" min="0" style="width:90px;" oninput="recalc()" placeholder="0" />
          </span>
        </div>
        <div class="totals-row grand">
          <span class="totals-label">合計總額</span>
          <span class="totals-value" id="grandDisplay">NT$ 0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- REMARKS -->
  <div class="remarks-card">
    <div class="remarks-deco">
      <img src="https://images.unsplash.com/photo-1600210492493-0946911123ea?w=400&auto=format&fit=crop&q=60" alt="" loading="lazy" />
    </div>
    <div class="remarks-body">
      <div class="remarks-label">備註 · 付款條件</div>
      <textarea class="remarks-ta" id="remarks" rows="5"
        placeholder="1. 本報價單有效期限為報價日起 30 天。&#10;2. 合約簽訂後，頭期款 30%，開工款 30%，完工款 40%。&#10;3. 工程期間如有追加工程，以書面確認後另計。&#10;4. 以上報價均含工資及材料，不含政府規費。"></textarea>
    </div>
  </div>

  <!-- SIGNATURES -->
  <div class="sig-row">
    <div class="sig-block"><div class="sig-block-label">業主確認簽名</div></div>
    <div class="sig-block"><div class="sig-block-label">設計師簽名</div></div>
    <div class="sig-block"><div class="sig-block-label">公司用印</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── HERO SLIDESHOW ──
const heroImages = [
  'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1400&auto=format&fit=crop&q=75',
  'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1400&auto=format&fit=crop&q=75',
  'https://images.unsplash.com/photo-1565538810643-b5bdb714032a?w=1400&auto=format&fit=crop&q=75',
  'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1400&auto=format&fit=crop&q=75',
];

const sectionImages = [
  'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=300&auto=format&fit=crop&q=60',
  'https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?w=300&auto=format&fit=crop&q=60',
  'https://images.unsplash.com/photo-1556912173-3bb406ef7e8d?w=300&auto=format&fit=crop&q=60',
  'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=300&auto=format&fit=crop&q=60',
  'https://images.unsplash.com/photo-1616047006789-b7af5afb8c20?w=300&auto=format&fit=crop&q=60',
];

let heroIndex = 0;
function initHero() {
  const banner = document.getElementById('heroBanner');
  const dotsEl = document.getElementById('heroDots');
  heroImages.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    slide.style.backgroundImage = `url(${src})`;
    banner.insertBefore(slide, banner.querySelector('.hero-overlay'));
    const dot = document.createElement('button');
    dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goHero(i);
    dotsEl.appendChild(dot);
  });
  setInterval(() => goHero((heroIndex + 1) % heroImages.length), 5000);
}
function goHero(idx) {
  const slides = document.querySelectorAll('.hero-slide');
  const dots = document.querySelectorAll('.hero-dot');
  slides[heroIndex].classList.remove('active');
  dots[heroIndex].classList.remove('active');
  heroIndex = idx;
  slides[heroIndex].classList.add('active');
  dots[heroIndex].classList.add('active');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── DATA ──
const defaultSections = [
  { id:'s1', name:'拆除工程', items:[
    { desc:'隔間牆拆除', spec:'RC 磚牆', unit:'式', qty:1, price:15000 },
    { desc:'天花板拆除', spec:'木作板材', unit:'坪', qty:35, price:1200 },
  ]},
  { id:'s2', name:'泥作工程', items:[
    { desc:'地坪打底整平', spec:'水泥砂漿', unit:'坪', qty:35, price:2500 },
    { desc:'磁磚鋪設', spec:'60x60cm 拋光石英磚', unit:'坪', qty:28, price:3200 },
  ]},
  { id:'s3', name:'木作工程', items:[
    { desc:'系統天花板', spec:'矽酸鈣板 + 骨料', unit:'坪', qty:30, price:4500 },
    { desc:'電視主牆造型', spec:'木皮飾板 + LED 燈帶', unit:'式', qty:1, price:45000 },
    { desc:'臥室衣櫃', spec:'系統板材 240H', unit:'尺', qty:12, price:3800 },
  ]},
  { id:'s4', name:'水電工程', items:[
    { desc:'全室管線更新', spec:'無鉛銅管 + WIRE 線材', unit:'式', qty:1, price:65000 },
    { desc:'迴路增設', spec:'20A 專用迴路', unit:'迴', qty:5, price:4500 },
  ]},
  { id:'s5', name:'油漆工程', items:[
    { desc:'全室批土粉刷', spec:'兩底一面樂土工法', unit:'坪', qty:35, price:2200 },
  ]},
];

let sections = JSON.parse(JSON.stringify(defaultSections));
let sectionCounter = sections.length;

// ── RENDER ──
function render() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';
  sections.forEach((sec, si) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.style.marginTop = si === 0 ? '16px' : '2px';

    const imgSrc = sectionImages[si % sectionImages.length];
    card.innerHTML = `
      <div class="section-deco"><img src="${imgSrc}" alt="" loading="lazy" /></div>
      <div class="section-inner">
        <div class="section-header">
          <div class="section-title">
            <div class="s-icon">${String.fromCharCode(65 + si)}</div>
            <input style="background:transparent;border:none;color:var(--gold);font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:0.12em;outline:none;width:220px;"
              value="${sec.name}" onchange="sections[${si}].name=this.value" />
          </div>
          <button class="btn" data-del-id="${sec.id}" style="font-size:11px;padding:5px 14px;" onclick="deleteSectionConfirm(${si})">移除類別</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="quote-table">
            <thead>
              <tr>
                <th style="width:32px;"></th>
                <th>工程項目</th>
                <th style="width:180px;">規格說明</th>
                <th style="width:60px;" class="right">單位</th>
                <th style="width:70px;" class="right">數量</th>
                <th style="width:100px;" class="right">單價</th>
                <th style="width:110px;" class="right">小計</th>
                <th style="width:40px;"></th>
              </tr>
            </thead>
            <tbody id="tbody-${sec.id}"></tbody>
          </table>
        </div>
        <div class="add-row">
          <button class="add-row-btn" onclick="addItem(${si})">＋ 新增項目</button>
        </div>
      </div>
    `;
    container.appendChild(card);

    const tbody = card.querySelector(`#tbody-${sec.id}`);
    sec.items.forEach((item, ii) => {
      const subtotal = item.qty * item.price;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center;color:var(--text-muted);font-size:11px;font-family:'DM Mono',monospace;padding:0 8px;">${ii+1}</td>
        <td><input class="cell-input" value="${item.desc}" placeholder="項目名稱" onchange="sections[${si}].items[${ii}].desc=this.value"/></td>
        <td><input class="cell-input" value="${item.spec}" placeholder="規格" onchange="sections[${si}].items[${ii}].spec=this.value"/></td>
        <td><input class="cell-input mono" value="${item.unit}" placeholder="式" onchange="sections[${si}].items[${ii}].unit=this.value" style="width:56px;"/></td>
        <td><input class="cell-input mono" type="number" value="${item.qty}" min="0" placeholder="0" oninput="sections[${si}].items[${ii}].qty=+this.value||0;recalc();updateRowTotal(this,'${sec.id}',${ii})"/></td>
        <td><input class="cell-input mono" type="number" value="${item.price}" min="0" placeholder="0" oninput="sections[${si}].items[${ii}].price=+this.value||0;recalc();updateRowTotal(this,'${sec.id}',${ii})"/></td>
        <td class="td-total" id="row-total-${sec.id}-${ii}">${fmtNum(subtotal)}</td>
        <td><button class="del-btn" title="刪除" onclick="deleteItem(${si},${ii})">×</button></td>
      `;
      tbody.appendChild(tr);
    });
  });
  recalc();
}

function updateRowTotal(input, secId, ii) {
  const si = sections.findIndex(s => s.id === secId);
  if (si < 0) return;
  const item = sections[si].items[ii];
  const el = document.getElementById(`row-total-${secId}-${ii}`);
  if (el) el.textContent = fmtNum(item.qty * item.price);
}

// ── ACTIONS ──
function addSection() {
  sectionCounter++;
  sections.push({ id:'s'+sectionCounter, name:'新增工程類別',
    items:[{ desc:'', spec:'', unit:'式', qty:1, price:0 }] });
  render();
}

const pendingDelete = {};
function deleteSectionConfirm(si) {
  if (sections.length <= 1) { showToast('至少保留一個工程類別'); return; }
  const key = sections[si].id;
  if (pendingDelete[key]) {
    clearTimeout(pendingDelete[key].timer);
    delete pendingDelete[key];
    sections.splice(si, 1);
    render();
  } else {
    const btn = document.querySelector(`[data-del-id="${key}"]`);
    if (btn) { btn.textContent='確認移除？'; btn.style.borderColor='var(--red)'; btn.style.color='var(--red)'; }
    pendingDelete[key] = { timer: setTimeout(() => {
      delete pendingDelete[key];
      if (btn) { btn.textContent='移除類別'; btn.style.borderColor=''; btn.style.color=''; }
    }, 3000) };
  }
}
function addItem(si) {
  sections[si].items.push({ desc:'', spec:'', unit:'式', qty:1, price:0 });
  render();
}
function deleteItem(si, ii) {
  sections[si].items.splice(ii, 1);
  render();
}

// ── CALC ──
function recalc() {
  let sub = 0;
  sections.forEach(sec => sec.items.forEach(i => { sub += (i.qty||0)*(i.price||0); }));
  const tax = Math.round(sub * (parseFloat(document.getElementById('taxRate').value)||0) / 100);
  const fee = parseFloat(document.getElementById('designFee').value)||0;
  document.getElementById('subtotalDisplay').textContent = 'NT$ ' + fmtNum(sub);
  document.getElementById('taxDisplay').textContent = 'NT$ ' + fmtNum(tax);
  document.getElementById('grandDisplay').textContent = 'NT$ ' + fmtNum(sub + tax + fee);
}
function fmtNum(n) { return Math.round(n).toLocaleString('zh-TW'); }

// ── INIT ──
function genDocNo() {
  const d = new Date();
  document.getElementById('docNo').textContent =
    `QT-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}-${String(Math.floor(Math.random()*900)+100)}`;
}
function setTodayDate() {
  const d = new Date();
  document.getElementById('quoteDate').value =
    `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
initHero();
genDocNo();
setTodayDate();
render();
</script>
</body>
</html>
